{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-4 md:py-12">
    <div class="glass p-6 md:p-12 rounded-3xl border-blue-500/20">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-xl md:text-3xl font-bold planet-nav text-blue-400 uppercase tracking-tighter md:tracking-normal">Mission Initialization</h2>
            <a href="{% url 'discovery:system_map' %}" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:border-blue-500/50 transition-all shrink-0">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>
        
        <form method="POST" class="space-y-6" id="init-form">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs uppercase tracking-widest text-blue-500 mb-4 font-mono font-black">Sector Topic (Folder Title)</label>
                <input type="text" name="topic" required placeholder="e.g. Governance, Agriculture, Policy..."
                       class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 focus:border-blue-500 outline-none transition-all text-blue-100 placeholder:text-gray-700 mb-6">
                
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-4 font-mono">Core Exploration Question</label>
                <textarea name="question" rows="6" required placeholder="What truth are we seeking? The substrate will generate a unique sector context for your inquiry."
                          class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 focus:border-blue-500 outline-none transition-all text-blue-100 placeholder:text-gray-700"></textarea>
            </div>

            <div class="pt-6">
                <button type="submit" 
                        onclick="showEngineSpinner()"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/40 flex items-center justify-center space-x-3">
                    <i class="fa-solid fa-rocket"></i>
                    <span>LAUNCH ENGINE</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
