{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto px-4 md:px-6 py-8 md:py-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <header class="mb-10 text-center">
        <h1 class="text-2xl md:text-3xl font-bold text-white mb-2 tracking-tight uppercase">System Control</h1>
        <p class="text-[9px] md:text-[10px] text-gray-500 font-light uppercase tracking-[0.4em]">A_WORLD_MODELS / COGNITIVE_CALIBRATION</p>
    </header>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="space-y-6">
            <!-- Reasoning Core -->
            <div class="glass p-8 rounded-[2rem] border-white/5 bg-white/[0.01] space-y-6">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="text-[9px] uppercase tracking-[0.3em] text-blue-500 font-bold">Reasoning Core</h4>
                    <span class="px-2 py-0.5 bg-blue-500/10 text-blue-400 text-[8px] font-bold rounded-full">PRIMARY</span>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-2 block">Intelligence Model</label>
                        <select name="active_model" class="bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs text-gray-300 focus:border-blue-500 outline-none w-full appearance-none">
                            <option value="sonnet" class="bg-[#0a0a0a] text-white" {% if settings.active_model == 'sonnet' %}selected{% endif %}>Claude 3.5 Sonnet (Canonical)</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-2 block">Anthropic API Key</label>
                        <input type="password" name="anthropic_api_key" value="{{ settings.anthropic_api_key|default:'' }}" class="bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs text-gray-300 focus:border-blue-500 outline-none w-full" placeholder="sk-ant-...">
                    </div>

                    <div class="pt-2">
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Reasoning Depth</label>
                            <span class="text-blue-500 font-mono text-sm font-bold">{{ settings.reasoning_depth }}</span>
                        </div>
                        <input type="range" name="reasoning_depth" min="3" max="15" value="{{ settings.reasoning_depth }}" class="w-full accent-blue-500 h-1 bg-white/5 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- Parameters -->
            <div class="glass p-8 rounded-[2rem] border-white/5 bg-white/[0.01] space-y-6">
                <h4 class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-bold">System Parameters</h4>
                
                <div class="grid grid-cols-1 gap-4">
                    <div class="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-clock-rotate-left text-gray-500 text-sm"></i>
                            <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Auto-Refresh (ms)</span>
                        </div>
                        <input type="number" name="auto_refresh_ms" value="{{ settings.auto_refresh_ms }}" class="bg-black/40 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-blue-400 font-mono w-24 text-right outline-none focus:border-blue-500">
                    </div>

                    <label class="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-search text-gray-400"></i>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Enable Web Search</span>
                        </div>
                        <input type="checkbox" name="enable_web_search" {% if settings.enable_web_search %}checked{% endif %} class="w-4 h-4 accent-blue-500 rounded border-white/10 bg-transparent">
                    </label>

                    <label class="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-shield-halved text-gray-400"></i>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Strict Governance</span>
                        </div>
                        <input type="checkbox" name="strict_governance" {% if settings.strict_governance %}checked{% endif %} class="w-4 h-4 accent-purple-500 rounded border-white/10 bg-transparent">
                    </label>

                    <label class="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-terminal text-gray-400"></i>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Debug Telemetry</span>
                        </div>
                        <input type="checkbox" name="debug_mode" {% if settings.debug_mode %}checked{% endif %} class="w-4 h-4 accent-emerald-500 rounded border-white/10 bg-transparent">
                    </label>

                    <label class="flex items-center justify-between p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-eye text-blue-400"></i>
                            <span class="text-[10px] text-blue-400 font-bold uppercase tracking-wider">Show Spending Overview</span>
                        </div>
                        <input type="checkbox" name="show_spending_overview" {% if settings.show_spending_overview %}checked{% endif %} class="w-4 h-4 accent-blue-500 rounded border-white/10 bg-transparent">
                    </label>

                    <label class="flex items-center justify-between p-4 bg-yellow-500/5 rounded-2xl border border-yellow-500/10 hover:border-yellow-500/20 transition-colors cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <i class="fa-solid fa-bolt-slash text-yellow-500/50"></i>
                            <span class="text-[10px] text-yellow-600 font-bold uppercase tracking-wider">Offline Simulation Mode</span>
                        </div>
                        <input type="checkbox" name="offline_mode" {% if settings.offline_mode %}checked{% endif %} class="w-4 h-4 accent-yellow-500 rounded border-yellow-500/20 bg-transparent">
                    </label>
                </div>
            </div>

            <!-- Versioning -->
            <div class="glass p-8 rounded-[2rem] border-white/5 bg-white/[0.01]">
                <h4 class="text-[9px] uppercase tracking-[0.3em] text-blue-500 font-bold mb-6">Versioning & Branding</h4>
                <div class="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5">
                    <div class="flex items-center space-x-3">
                        <i class="fa-solid fa-code-branch text-gray-500 text-sm"></i>
                        <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">System Version String</span>
                    </div>
                    <input type="text" name="system_version" value="{{ settings.system_version }}" class="bg-black/40 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-blue-400 font-mono w-48 text-right outline-none focus:border-blue-500" placeholder="e.g. V1.0 ALPHA">
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center pt-8">
            <a href="{% url 'discovery:clear_lock' %}" class="px-6 py-4 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-2xl text-[9px] font-bold uppercase tracking-widest transition-all border border-red-500/10">
                Clear Active Engine Lock
            </a>
            <button type="submit" class="w-1/2 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest transition-all shadow-xl shadow-blue-600/20 active:scale-95">
                Save System Parameters
            </button>
        </div>
    </form>
</div>
{% endblock %}
