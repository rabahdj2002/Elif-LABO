<div id="planet-data-container" hx-swap-oob="true">
    <div class="prose prose-invert max-w-none">
        {% if planet.data %}
            <div class="space-y-4">
                {% for key, value in planet.data.items %}
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <strong class="text-blue-300 uppercase text-xs tracking-wider">{{ key }}</strong>
                    <p class="mt-2 text-gray-300">{{ value }}</p>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="text-center py-20">
                <i class="fa-solid fa-microchip text-4xl text-gray-700 mb-4 block"></i>
                <p class="text-gray-500">Initializing sensors... Run the engine to populate this world.</p>
            </div>
        {% endif %}
    </div>
</div>

<div id="planet-status-tag" hx-swap-oob="true" class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">
    {{ planet.status }}
</div>
