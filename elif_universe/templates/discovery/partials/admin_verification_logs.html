<div class="space-y-6">
    <div class="flex items-center justify-between px-2">
        <h2 class="text-xs uppercase font-black tracking-[0.3em] text-gray-500">Global Verification Log</h2>
        <div class="flex items-center gap-4">
            <span class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                <span class="text-[8px] uppercase font-bold text-gray-400">Stable</span>
            </span>
            <span class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                <span class="text-[8px] uppercase font-bold text-gray-400">Anomalous</span>
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        {% for run in test_runs %}
            {% include "discovery/partials/test_run_card.html" %}
        {% endfor %}
    </div>
</div>
