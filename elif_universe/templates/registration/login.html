{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto py-12 px-4">
    <div class="glass p-8 md:p-12 rounded-[2.5rem] border border-blue-500/20 shadow-2xl shadow-blue-900/10">
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-blue-600/10 border border-blue-500/30 rounded-2xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-lock text-blue-400 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Sovereign Access</h1>
            <p class="text-[10px] text-blue-500 font-mono uppercase tracking-[0.3em] font-bold">Authentication Required</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs italic">
                Sovereign Denial: Invalid credentials provided.
            </div>
            {% endif %}

            <div class="space-y-2">
                <label class="text-[9px] uppercase tracking-widest text-gray-500 font-bold ml-2">Identifier</label>
                <input type="text" name="username" required
                       class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500/50 outline-none transition-all text-sm font-light">
            </div>

            <div class="space-y-2">
                <label class="text-[9px] uppercase tracking-widest text-gray-500 font-bold ml-2">Access Key</label>
                <input type="password" name="password" required
                       class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500/50 outline-none transition-all text-sm font-light">
            </div>

            <button type="submit" 
                    class="w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black uppercase tracking-[0.2em] transition-all shadow-lg shadow-blue-900/40">
                Grant Access
            </button>
            
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 text-center">
            <p class="text-[9px] text-gray-600 uppercase tracking-widest leading-relaxed">
                Unauthorized access to the ELIF Alpha Engine <br> is strictly monitored.
            </p>
        </div>
    </div>
</div>
{% endblock %}
